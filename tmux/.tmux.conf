set-option -g display-time 4000
###############################################################################
# General options/*{{{*/
###############################################################################


# Set history limit to 10000
set -g history-limit 10000

# Fixing escape issue in neovim
set -sg escape-time 0

# Number windows and panes starting with 1
set-option -g base-index 1
set-option -g pane-base-index 1

# Set 256-color Terminal
set-option -g default-terminal "tmux-256color"

# Enable vi-mode
set-window-option -g mode-keys vi
bind p paste-buffer
# bind-key -t vi-copy 'v' begin-selection
# bind-key -t vi-copy 'y' copy-selection

# Watch for activity in the background windows
set -g bell-action any
set -g monitor-activity on

# Pass through xterm-keys
set -g xterm-keys on
set -g extended-keys on
set -g extended-keys-format csi-u

set -g focus-events on

# Tell tmux what the outer terminal (Ghostty: TERM=xterm-ghostty) can do.
# RGB     -> truecolor (modern replacement for the old `Tc` override)
# cstyle  -> pass through cursor-shape / blink (Ss/Se, DECSCUSR)
# sync    -> pass through synchronized output (fixes redraw artifacts, e.g. /reset)
# usstyle -> undercurl / colored underlines; hyperlinks -> OSC 8 links
set -ga terminal-features 'xterm-ghostty:RGB:cstyle:sync:usstyle:hyperlinks:focus'
# Safe-everywhere fallbacks so cursor + sync work over ssh / other terminals too
set -ga terminal-features '*:cstyle:sync'


# Create new session on attach if it doesnt exists
new-session -n main

set-option -ga update-environment 'PATH'

# https://github.com/direnv/direnv/issues/106
# set-environment -r DIRENV_DIFF
set-option -g update-environment "... DIRENV_DIFF"

#set -g default-shell $SHELL
#set -g default-command "reattach-to-user-namespace -l ${SHELL}"

# enable mouse scrolling by default
set-option -g mouse on

set -g @continuum-restore 'on'

# Theme: catppuccin-mocha
# Base: #1e1e2e, Mantle: #181825, Crust: #11111b
# Surface0: #313244, Surface1: #45475a, Surface2: #585b70
# Overlay0: #6c7086, Subtext0: #a6adc8, Text: #cdd6f4
# Blue: #89b4fa, Mauve: #cba6f7, Red: #f38ba8
set -g pane-active-border-style fg=#cba6f7

###############################################################################/*}}}*/
# Key bindings/*{{{*/
###############################################################################

# Change multiplexer key to c-a
set-option -g prefix C-s #
unbind-key C-b
bind-key Space send-prefix

# Reload configuration file
bind-key F12 source-file ~/.tmux.conf

# Toggle status bar
bind-key b set -g status

# Zoom Window
bind-key c-m resize-pane -Z

# Go into copy mode
bind-key y copy-mode

# Toggle Multi Input Mode
bind-key m set-window-option synchronize-panes

# Use tab to goto next window; quick switching between panes
unbind-key Tab
bind-key Tab select-window -n
# bind-key C-\ select-pane -t :.+

# Use vim like commands to toggle between panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|\\-?n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Swap windows left/right
bind-key S-h swap-window -t -1
bind-key S-l swap-window -t +1

# Use vim like commands to resize panes
bind-key H resize-pane -L
bind-key J resize-pane -D
bind-key K resize-pane -U
bind-key L resize-pane -R

# Goto last active window
bind-key C-^ last-window

# Kill single pane
bind-key C-q killp

# Open new window
bind-key n new-window

# Spliting Panels
bind-key C-s splitw
bind-key C-v splitw -h

# Select layout with fzf
bind-key t display-popup -E "~/.dotfiles/bin/tmux-select-layout"

# Show active windows/sessions
bind-key w find-window *
bind-key s choose-session

###############################################################################/*}}}*/
# Colors & Apperance/*{{{*/
###############################################################################

# Show statusbar by default
set -g status on

# Set title for terminal-emulator
set-option -g set-titles on
set-option -g set-titles-string '[#S:#I #H] #W'

# Theme: catppuccin-mocha
set -g status-interval 2
set -g status-fg '#cdd6f4'
set -g status-bg '#1e1e2e'
set -g status-left-length 30
set -g status-left '#[fg=#11111b,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e,nobold]'
set -g status-right-length 150
set -g status-right '#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244] #(cut -d " " -f 1-3 /proc/loadavg) #[fg=#45475a,bg=#313244]#[fg=#cdd6f4,bg=#45475a] #(whoami)@#(hostname -s) '
set -g window-status-format "#[fg=#6c7086,bg=#1e1e2e] #I #[fg=#a6adc8] #W #F "
set -g window-status-current-format "#[fg=#11111b,bg=#89b4fa,bold] #I  #W #F #[fg=#89b4fa,bg=#1e1e2e,nobold]"
###############################################################################/*}}}*/
